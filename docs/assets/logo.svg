<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Graph search icon: central node with connections + magnifying glass handle -->

  <!-- Connection lines (white, from center to outer nodes) -->
  <g stroke="#ffffff" stroke-width="3.5" stroke-linecap="round">
    <!-- top-left -->
    <line x1="100" y1="90" x2="62" y2="52"/>
    <!-- top -->
    <line x1="100" y1="90" x2="100" y2="42"/>
    <!-- top-right -->
    <line x1="100" y1="90" x2="142" y2="56"/>
    <!-- right -->
    <line x1="100" y1="90" x2="148" y2="90"/>
    <!-- bottom-left -->
    <line x1="100" y1="90" x2="58" y2="118"/>
    <!-- bottom (toward handle area) -->
    <line x1="100" y1="90" x2="108" y2="120"/>
  </g>

  <!-- Outer nodes (small white circles) -->
  <g fill="#ffffff">
    <circle cx="62" cy="52" r="6"/>
    <circle cx="100" cy="42" r="6"/>
    <circle cx="142" cy="56" r="6"/>
    <circle cx="148" cy="90" r="6"/>
    <circle cx="58" cy="118" r="6"/>
  </g>

  <!-- Small dots on nodes for detail -->
  <g fill="#ffffff">
    <circle cx="50" cy="44" r="3"/>
    <circle cx="96" cy="30" r="3"/>
    <circle cx="154" cy="48" r="3"/>
    <circle cx="160" cy="92" r="3"/>
    <circle cx="46" cy="124" r="3"/>
  </g>

  <!-- Tiny connection stubs from outer nodes -->
  <g stroke="#ffffff" stroke-width="2.5" stroke-linecap="round">
    <line x1="62" y1="52" x2="50" y2="44"/>
    <line x1="100" y1="42" x2="96" y2="30"/>
    <line x1="142" y1="56" x2="154" y2="48"/>
    <line x1="148" y1="90" x2="160" y2="92"/>
    <line x1="58" y1="118" x2="46" y2="124"/>
  </g>

  <!-- Central circle (magnifying glass lens) — pink/red ring -->
  <circle cx="100" cy="90" r="18" fill="#1a1a1a" stroke="#ff2d55" stroke-width="5"/>

  <!-- Magnifying glass handle — pink/red rounded -->
  <line x1="113" y1="103" x2="132" y2="128" stroke="#ff2d55" stroke-width="7" stroke-linecap="round"/>
</svg>
