name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# Palace-X is purpose-built for Apple Silicon (NEON + Metal + UMA).
# palace-optimizer depends on metal/core-foundation/mach2/objc which do not
# compile on Linux, so test + clippy run on macOS only.

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --release

  clippy:
    name: Clippy
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo clippy --workspace --all-targets -- \
            -D warnings \
            -A async_fn_in_trait \
            -A unreachable_code \
            -A dead_code \
            -A unused_variables \
            -A unused_imports \
            -A unused_mut \
            -A unused_assignments \
            -A unused_unsafe \
            -A clippy::manual_div_ceil \
            -A clippy::redundant_closure \
            -A clippy::map_entry \
            -A clippy::non_canonical_partial_ord_impl \
            -A clippy::overly_complex_bool_expr \
            -A clippy::manual_clamp \
            -A clippy::needless_range_loop \
            -A clippy::manual_slice_size_calculation \
            -A clippy::identity_op \
            -A clippy::clone_on_copy \
            -A clippy::new_without_default \
            -A clippy::unnecessary_to_owned \
            -A clippy::io_other_error \
            -A clippy::manual_is_multiple_of \
            -A clippy::needless_return \
            -A clippy::missing_safety_doc \
            -A clippy::collapsible_if

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Recall regression gate — fails if RaBitQ R@10 drops below threshold
  bench-recall:
    name: Recall Regression
    runs-on: macos-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run SIFT-10K benchmark
        run: |
          mkdir -p data
          cargo run -p palace-bench --release -- --sift 2>&1 | tee bench_output.txt
      - name: Check recall thresholds
        run: |
          echo "=== Recall Regression Check ==="
          # Extract RaBitQ 1-bit R@10 from either output format:
          #   (a) inline:  "RaBitQ 1-bit ...  R@10=54.0%  ..."
          #   (b) table:   "| RaBitQ 1-bit | 51.0% | 54.0% | ..."
          # Works on BSD awk (macOS) — no -P / Perl regex required.
          R10=$(awk '
            /RaBitQ 1-bit/ {
              # Try inline format first: R@10=NN.N or R@10: NN.N
              if (match($0, /R@10[=:][[:space:]]*[0-9]+(\.[0-9]+)?/)) {
                s = substr($0, RSTART, RLENGTH)
                gsub(/[^0-9.]/, "", s)
                print s; exit
              }
              # Fallback: pipe-delimited table, R@10 is column 4
              if ($0 ~ /\|/) {
                n = split($0, a, "|")
                if (n >= 4) {
                  v = a[4]; gsub(/[%[:space:]*]/, "", v)
                  if (v ~ /^[0-9]+(\.[0-9]+)?$/) { print v; exit }
                }
              }
            }
          ' bench_output.txt)
          if [ -z "$R10" ]; then R10="0"; fi
          echo "RaBitQ 1-bit R@10 = ${R10}%"
          # Fail if recall dropped below 45% (current: ~54%, allows some variance)
          python3 -c "
          r = float('${R10}')
          threshold = 45.0
          print(f'Threshold: {threshold}%')
          if r < threshold:
              print(f'FAIL: R@10 {r}% < {threshold}%')
              exit(1)
          print(f'PASS: R@10 {r}% >= {threshold}%')
          "
      - name: Upload benchmark output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-output
          path: bench_output.txt
          retention-days: 30

  # Coverage report via cargo-tarpaulin
  coverage:
    name: Coverage
    runs-on: macos-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Generate coverage
        run: cargo tarpaulin --workspace --out xml --output-dir coverage/ --skip-clean
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/cobertura.xml
          retention-days: 30
